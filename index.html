<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVGMaker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="app">
    <!-- Menu Bar -->
    <header id="menu-bar">
      <nav class="menu-items">
        <div class="menu-dropdown" data-menu="file">
          <span class="menu-trigger">File</span>
          <div class="menu-panel">
            <button data-action="new">New... <span class="shortcut">Ctrl+N</span></button>
            <button data-action="open-project">Open Project... <span class="shortcut">Ctrl+O</span></button>
            <button data-action="save-project">Save Project <span class="shortcut">Ctrl+S</span></button>
            <div class="menu-divider"></div>
            <button data-action="import">Import SVG...</button>
            <button data-action="export">Export Active Artboard SVG... <span class="shortcut">Ctrl+Shift+S</span></button>
            <button data-action="export-all">Export Artboards... <span class="shortcut">Ctrl+Alt+E</span></button>
          </div>
        </div>
        <div class="menu-dropdown" data-menu="edit">
          <span class="menu-trigger">Edit</span>
          <div class="menu-panel">
            <button data-action="undo">Undo <span class="shortcut">Ctrl+Z</span></button>
            <button data-action="redo">Redo <span class="shortcut">Ctrl+Shift+Z</span></button>
            <div class="menu-divider"></div>
            <button data-action="cut">Cut <span class="shortcut">Ctrl+X</span></button>
            <button data-action="copy">Copy <span class="shortcut">Ctrl+C</span></button>
            <button data-action="paste">Paste <span class="shortcut">Ctrl+V</span></button>
            <div class="menu-divider"></div>
            <button data-action="duplicate">Duplicate <span class="shortcut">Ctrl+D</span></button>
            <button data-action="delete">Delete <span class="shortcut">Del</span></button>
            <div class="menu-divider"></div>
            <button data-action="select-all">Select All <span class="shortcut">Ctrl+A</span></button>
            <button data-action="deselect">Deselect <span class="shortcut">Ctrl+Shift+A</span></button>
          </div>
        </div>
        <div class="menu-dropdown" data-menu="object">
          <span class="menu-trigger">Object</span>
          <div class="menu-panel">
            <button data-action="group">Group <span class="shortcut">Ctrl+G</span></button>
            <button data-action="ungroup">Ungroup <span class="shortcut">Ctrl+Shift+G</span></button>
            <div class="menu-divider"></div>
            <button data-action="create-symbol">Create Symbol</button>
            <button data-action="detach-symbol">Detach Instance</button>
            <div class="menu-divider"></div>
            <button data-action="bring-front">Bring to Front <span class="shortcut">Ctrl+Shift+]</span></button>
            <button data-action="bring-forward">Bring Forward <span class="shortcut">Ctrl+]</span></button>
            <button data-action="send-backward">Send Backward <span class="shortcut">Ctrl+[</span></button>
            <button data-action="send-back">Send to Back <span class="shortcut">Ctrl+Shift+[</span></button>
            <div class="menu-divider"></div>
            <button data-action="lock">Lock <span class="shortcut">Ctrl+2</span></button>
            <button data-action="unlock-all">Unlock All <span class="shortcut">Ctrl+Alt+2</span></button>
            <div class="menu-divider"></div>
            <button data-action="hide">Hide <span class="shortcut">Ctrl+3</span></button>
            <button data-action="show-all">Show All <span class="shortcut">Ctrl+Alt+3</span></button>
          </div>
        </div>
        <div class="menu-dropdown" data-menu="view">
          <span class="menu-trigger">View</span>
          <div class="menu-panel">
            <button data-action="zoom-in">Zoom In <span class="shortcut">Ctrl+=</span></button>
            <button data-action="zoom-out">Zoom Out <span class="shortcut">Ctrl+-</span></button>
            <button data-action="zoom-fit">Fit Artboard <span class="shortcut">Ctrl+0</span></button>
            <button data-action="zoom-100">Actual Size <span class="shortcut">Ctrl+1</span></button>
            <div class="menu-divider"></div>
            <button data-action="toggle-transparency">Show Transparency</button>
            <button data-action="toggle-grid">Show Grid <span class="shortcut">Ctrl+'</span></button>
            <button data-action="toggle-rulers">Show Rulers <span class="shortcut">Ctrl+R</span></button>
          </div>
        </div>
      </nav>
    </header>

    <!-- Control/Options Bar -->
    <div id="control-bar">
      <div id="control-bar-content">
        <!-- Dynamically updated based on selected tool/shape -->
        <div class="ctrl-group" id="ctrl-transform">
          <label>X:</label><input type="number" id="ctrl-x" value="0" step="1" />
          <label>Y:</label><input type="number" id="ctrl-y" value="0" step="1" />
          <label>W:</label><input type="number" id="ctrl-w" value="0" step="1" min="0" />
          <label>H:</label><input type="number" id="ctrl-h" value="0" step="1" min="0" />
          <label title="Rotation">R:</label><input type="number" id="ctrl-rotation" value="0" step="1" /><span class="ctrl-unit">&deg;</span>
        </div>
        <span class="ctrl-sep"></span>
        <div class="ctrl-group" id="ctrl-fill-stroke">
          <label>Fill:</label>
          <div class="ctrl-color-swatch" id="ctrl-fill-swatch">
            <input type="color" id="ctrl-fill" value="#FFFFFF" />
            <button class="ctrl-none-btn" id="ctrl-fill-none" title="No fill">&#x2205;</button>
          </div>
          <label>Stroke:</label>
          <div class="ctrl-color-swatch" id="ctrl-stroke-swatch">
            <input type="color" id="ctrl-stroke" value="#000000" />
            <button class="ctrl-none-btn" id="ctrl-stroke-none" title="No stroke">&#x2205;</button>
          </div>
          <label>Weight:</label>
          <input type="number" id="ctrl-stroke-weight" value="1" min="0" max="200" step="0.5" />
        </div>
        <span class="ctrl-sep"></span>
        <div class="ctrl-group" id="ctrl-opacity-group">
          <label>Opacity:</label>
          <input type="number" id="ctrl-opacity" value="100" min="0" max="100" step="1" />
          <span class="ctrl-unit">%</span>
        </div>
      </div>
    </div>

    <div id="workspace">
      <!-- Left Toolbar (Illustrator-style double column) -->
      <aside id="toolbar">
        <div class="tool-section">
          <button class="tool-btn active" data-tool="select" title="Selection Tool (V)">
            <svg viewBox="0 0 24 24"><path d="M4 2l12 16-4.5-1.5L8 22V8L4 2z" fill="currentColor"/></svg>
          </button>
          <button class="tool-btn" data-tool="directSelect" title="Direct Selection Tool (A)">
            <svg viewBox="0 0 24 24"><path d="M5 3l11 15-4.2-1.4L8.5 21.5V9L5 3z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="rect" title="Rectangle Tool (M)">
            <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="roundedRect" title="Rounded Rectangle Tool">
            <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="ellipse" title="Ellipse Tool (L)">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="polygon" title="Polygon Tool">
            <svg viewBox="0 0 24 24"><polygon points="12,3 21,10 18,20 6,20 3,10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="star" title="Star Tool">
            <svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="line" title="Line Segment Tool (\)">
            <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="polyline" title="Polyline Tool">
            <svg viewBox="0 0 24 24"><polyline points="4,20 10,6 16,16 22,4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="path" title="Pen Tool (P)">
            <svg viewBox="0 0 24 24"><path d="M4 20 Q12 4 20 12" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="20" r="2" fill="currentColor"/><circle cx="20" cy="12" r="2" fill="currentColor"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="text" title="Type Tool (T)">
            <svg viewBox="0 0 24 24"><text x="12" y="19" text-anchor="middle" font-size="18" font-weight="bold" fill="currentColor" font-family="serif">T</text></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="image" title="Image Tool">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="2" fill="currentColor"/><path d="M3 17l5-5 3 3 4-5 6 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="eyedropper" title="Eyedropper Tool (I)">
            <svg viewBox="0 0 24 24"><path d="M20 4l-1.5 1.5M15.5 8.5l-8 8L5 20l3.5-2.5 8-8M13 6l5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="artboard" title="Artboard Tool (Shift+O)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="0.8" stroke-dasharray="2,2"/><line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="0.8" stroke-dasharray="2,2"/></svg>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <button class="tool-btn" data-tool="hand" title="Hand Tool (H)">
            <svg viewBox="0 0 24 24"><path d="M12 2v8M8 5v7M16 5v7M20 10v6c0 3-2 5-5 5h-6c-3 0-5-2-5-5v-3l2-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="tool-btn" data-tool="zoom" title="Zoom Tool (Z)">
            <svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="7" x2="10" y2="13" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
        </div>

        <div class="tool-spacer"></div>

        <!-- Fill/Stroke swatches at bottom of toolbar -->
        <div class="toolbar-swatches">
          <div class="swatch-stack">
            <div class="swatch-fill" id="tb-fill-swatch" title="Fill Color">
              <div class="swatch-inner"></div>
            </div>
            <div class="swatch-stroke" id="tb-stroke-swatch" title="Stroke Color">
              <div class="swatch-inner"></div>
            </div>
          </div>
          <div class="swatch-controls">
            <button id="tb-swap" title="Swap Fill & Stroke (Shift+X)" class="swatch-swap">&#x21C4;</button>
            <button id="tb-default" title="Default Fill & Stroke (D)" class="swatch-default">
              <svg viewBox="0 0 18 18" width="12" height="12"><rect x="1" y="1" width="10" height="10" fill="white" stroke="black" stroke-width="1"/><rect x="7" y="7" width="10" height="10" fill="none" stroke="black" stroke-width="2"/></svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Ruler Top -->
      <div id="ruler-corner"></div>
      <canvas id="ruler-h" height="20"></canvas>

      <!-- Ruler Left -->
      <canvas id="ruler-v" width="20"></canvas>

      <!-- Canvas Area -->
      <main id="canvas-area">
        <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="grid-small" width="10" height="10" patternUnits="userSpaceOnUse">
              <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e8e8e8" stroke-width="0.3"/>
            </pattern>
            <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
              <rect width="100" height="100" fill="url(#grid-small)"/>
              <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d0d0d0" stroke-width="0.5"/>
            </pattern>
            <pattern id="transparency-check" width="16" height="16" patternUnits="userSpaceOnUse">
              <rect width="16" height="16" fill="#ffffff"/>
              <rect width="8" height="8" fill="#e0e0e0"/>
              <rect x="8" y="8" width="8" height="8" fill="#e0e0e0"/>
            </pattern>
          </defs>
          <!-- Pasteboard (dark area outside artboard) -->
          <rect id="pasteboard" x="-10000" y="-10000" width="20000" height="20000" fill="#535353"/>
          <!-- Artboard backgrounds rendered dynamically -->
          <g id="artboards-layer"></g>
          <!-- Grid overlay (toggled via View menu) -->
          <rect id="artboard-grid" x="0" y="0" width="0" height="0" fill="url(#grid-large)" style="display:none" pointer-events="none"/>
          <!-- Drawing content -->
          <g id="drawing-layer"></g>
          <!-- Artboard labels & handles rendered dynamically -->
          <g id="artboard-labels-layer"></g>
          <g id="artboard-handles-layer"></g>
          <!-- Guides & selection overlays -->
          <g id="guides-layer"></g>
          <g id="selection-layer"></g>
        </svg>
      </main>

      <!-- Right Panels -->
      <aside id="panels">
        <!-- Properties / Transform -->
        <div class="panel" id="panel-properties">
          <div class="panel-header" data-panel="properties">
            <span>Properties</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body">
            <div class="panel-row">
              <div class="panel-field">
                <label>X</label><input type="number" id="prop-x" value="0" step="1" />
              </div>
              <div class="panel-field">
                <label>W</label><input type="number" id="prop-w" value="0" step="1" min="0" />
              </div>
            </div>
            <div class="panel-row">
              <div class="panel-field">
                <label>Y</label><input type="number" id="prop-y" value="0" step="1" />
              </div>
              <div class="panel-field">
                <label>H</label><input type="number" id="prop-h" value="0" step="1" min="0" />
              </div>
            </div>
            <div class="panel-row">
              <div class="panel-field">
                <label title="Rotation">R</label><input type="number" id="prop-rotation" value="0" step="1" /><span class="panel-unit">&deg;</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Appearance -->
        <div class="panel" id="panel-appearance">
          <div class="panel-header" data-panel="appearance">
            <span>Appearance</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body">
            <!-- Fill group -->
            <div class="appearance-group" id="fill-group">
              <div class="appearance-row">
                <button class="appearance-toggle" id="prop-fill-none" title="Toggle Fill on/off">Fill</button>
                <div class="appearance-color-btn" id="prop-fill-btn" title="Click to pick fill color" data-target="fill">
                  <div class="appearance-color-inner" id="prop-fill-preview" style="background:#FFFFFF"></div>
                </div>
              </div>
            </div>

            <div class="appearance-divider"></div>

            <!-- Stroke group -->
            <div class="appearance-group" id="stroke-group">
              <div class="appearance-row">
                <button class="appearance-toggle" id="prop-stroke-none" title="Toggle Stroke on/off">Stroke</button>
                <div class="appearance-color-btn" id="prop-stroke-btn" title="Click to pick stroke color" data-target="stroke">
                  <div class="appearance-color-inner" id="prop-stroke-preview" style="background:#000000"></div>
                </div>
                <input type="number" id="prop-stroke-width" value="1" min="0" max="200" step="0.5" class="appearance-weight" title="Stroke Weight" />
                <span class="appearance-unit">pt</span>
                <button class="stroke-expand-btn" id="stroke-expand" title="Stroke options">&#x25BC;</button>
              </div>
              <div class="stroke-details" id="stroke-details">
                <div class="stroke-detail-row">
                  <label>Weight</label>
                  <input type="number" id="stroke-weight" value="1" min="0" step="0.5" />
                </div>
                <div class="stroke-detail-row">
                  <label>Cap</label>
                  <div class="btn-group" id="stroke-caps">
                    <button data-cap="butt" class="active" title="Butt Cap">
                      <svg viewBox="0 0 20 14"><line x1="4" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="4" stroke-linecap="butt"/></svg>
                    </button>
                    <button data-cap="round" title="Round Cap">
                      <svg viewBox="0 0 20 14"><line x1="4" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
                    </button>
                    <button data-cap="square" title="Projecting Cap">
                      <svg viewBox="0 0 20 14"><line x1="4" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="4" stroke-linecap="square"/></svg>
                    </button>
                  </div>
                </div>
                <div class="stroke-detail-row">
                  <label>Join</label>
                  <div class="btn-group" id="stroke-joins">
                    <button data-join="miter" class="active" title="Miter Join">
                      <svg viewBox="0 0 20 14"><polyline points="4,12 10,2 16,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="miter"/></svg>
                    </button>
                    <button data-join="round" title="Round Join">
                      <svg viewBox="0 0 20 14"><polyline points="4,12 10,2 16,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                    </button>
                    <button data-join="bevel" title="Bevel Join">
                      <svg viewBox="0 0 20 14"><polyline points="4,12 10,2 16,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="bevel"/></svg>
                    </button>
                  </div>
                </div>
                <div class="stroke-detail-row">
                  <label>Dash</label>
                  <input type="text" id="stroke-dash" value="" placeholder="e.g. 5,3" />
                </div>
              </div>
            </div>

            <!-- Corner radius (rect only) -->
            <div class="appearance-row" id="prop-corners-row" style="display:none">
              <span class="appearance-label" title="Corner Radius">&#x25E2; Radius</span>
              <input type="number" id="prop-rx" value="0" step="1" min="0" title="Corner Radius" class="appearance-weight" style="width:54px" />
              <span class="appearance-unit">px</span>
            </div>

            <div class="appearance-divider"></div>

            <!-- Opacity -->
            <div class="appearance-row">
              <span class="appearance-label">Opacity</span>
              <input type="range" id="prop-opacity" min="0" max="1" step="0.01" value="1" class="appearance-slider" />
              <span id="prop-opacity-val" class="appearance-pct">100%</span>
            </div>
          </div>
        </div>

        <!-- Align -->
        <div class="panel" id="panel-align">
          <div class="panel-header" data-panel="align">
            <span>Align</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body">
            <div class="align-buttons">
              <button data-align="left" title="Align Left">
                <svg viewBox="0 0 20 20"><line x1="3" y1="2" x2="3" y2="18" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="4" width="12" height="4" fill="currentColor"/><rect x="3" y="12" width="8" height="4" fill="currentColor"/></svg>
              </button>
              <button data-align="center-h" title="Align Center">
                <svg viewBox="0 0 20 20"><line x1="10" y1="2" x2="10" y2="18" stroke="currentColor" stroke-width="1"/><rect x="4" y="4" width="12" height="4" fill="currentColor"/><rect x="6" y="12" width="8" height="4" fill="currentColor"/></svg>
              </button>
              <button data-align="right" title="Align Right">
                <svg viewBox="0 0 20 20"><line x1="17" y1="2" x2="17" y2="18" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="4" width="12" height="4" fill="currentColor"/><rect x="9" y="12" width="8" height="4" fill="currentColor"/></svg>
              </button>
              <button data-align="top" title="Align Top">
                <svg viewBox="0 0 20 20"><line x1="2" y1="3" x2="18" y2="3" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="3" width="4" height="12" fill="currentColor"/><rect x="12" y="3" width="4" height="8" fill="currentColor"/></svg>
              </button>
              <button data-align="center-v" title="Align Middle">
                <svg viewBox="0 0 20 20"><line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1"/><rect x="4" y="4" width="4" height="12" fill="currentColor"/><rect x="12" y="6" width="4" height="8" fill="currentColor"/></svg>
              </button>
              <button data-align="bottom" title="Align Bottom">
                <svg viewBox="0 0 20 20"><line x1="2" y1="17" x2="18" y2="17" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="5" width="4" height="12" fill="currentColor"/><rect x="12" y="9" width="4" height="8" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Type (shown only when text selected) -->
        <div class="panel" id="panel-type" style="display:none">
          <div class="panel-header" data-panel="type">
            <span>Character</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body">
            <div class="panel-row">
              <div class="panel-field full">
                <label>Font</label>
                <select id="prop-font-family">
                  <option value="Arial">Arial</option>
                  <option value="Helvetica">Helvetica</option>
                  <option value="Times New Roman">Times New Roman</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Courier New">Courier New</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Impact">Impact</option>
                  <option value="Comic Sans MS">Comic Sans MS</option>
                </select>
              </div>
            </div>
            <div class="panel-row">
              <div class="panel-field">
                <label>Size</label>
                <input type="number" id="prop-font-size" value="24" min="1" max="999" />
              </div>
              <div class="panel-field">
                <label>Style</label>
                <select id="prop-font-weight">
                  <option value="normal">Regular</option>
                  <option value="bold">Bold</option>
                </select>
              </div>
            </div>
            <div class="panel-row">
              <button id="prop-italic" class="text-style-btn" title="Italic">I</button>
            </div>
          </div>
        </div>

        <!-- Symbols -->
        <div class="panel" id="panel-symbols">
          <div class="panel-header" data-panel="symbols">
            <span>Symbols</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body panel-body-layers">
            <ul id="symbols-list"></ul>
          </div>
          <div class="panel-footer">
            <button id="btn-create-symbol" title="Create Symbol from Selection">+ Create</button>
            <button id="btn-detach-symbol" title="Detach Symbol Instance">Detach</button>
          </div>
        </div>

        <!-- Artboards -->
        <div class="panel" id="panel-artboards">
          <div class="panel-header" data-panel="artboards">
            <span>Artboards</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body panel-body-layers">
            <ul id="artboards-list"></ul>
          </div>
          <div class="panel-footer">
            <button id="btn-ab-add" title="Add Artboard">+ Add</button>
            <button id="btn-ab-delete" title="Delete Artboard">&#x1F5D1; Delete</button>
          </div>
        </div>

        <!-- Layers -->
        <div class="panel" id="panel-layers">
          <div class="panel-header" data-panel="layers">
            <span>Layers</span>
            <button class="panel-collapse">&#x25BC;</button>
          </div>
          <div class="panel-body panel-body-layers">
            <ul id="layers-list"></ul>
          </div>
          <div class="panel-footer">
            <button id="btn-layer-up" title="Move Up">&#x2191;</button>
            <button id="btn-layer-down" title="Move Down">&#x2193;</button>
            <button id="btn-layer-duplicate" title="Duplicate">&#x2398;</button>
            <button id="btn-layer-delete" title="Delete">&#x1F5D1;</button>
          </div>
        </div>
      </aside>
    </div>

    <!-- Status Bar -->
    <footer id="status-bar">
      <div class="status-left">
        <span id="tool-label">Selection Tool</span>
      </div>
      <div class="status-center">
        <span id="cursor-pos">0, 0</span>
        &nbsp;&middot;&nbsp;
        <span id="artboard-label">960 &times; 540</span>
      </div>
      <div class="status-right">
        <button id="btn-zoom-out" class="status-btn">&minus;</button>
        <select id="zoom-select">
          <option value="0.125">12.5%</option>
          <option value="0.25">25%</option>
          <option value="0.333">33.3%</option>
          <option value="0.5">50%</option>
          <option value="0.667">66.7%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="3">300%</option>
          <option value="4">400%</option>
          <option value="6">600%</option>
        </select>
        <button id="btn-zoom-in" class="status-btn">+</button>
        <button id="btn-zoom-fit" class="status-btn" title="Fit Artboard in Window">&#x2922;</button>
      </div>
    </footer>
  </div>
  <input type="file" id="file-input" accept=".svg,.png,.jpg,.jpeg,.gif,.webp" style="display:none" />
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
